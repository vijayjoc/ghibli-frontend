<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghibli AI - Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ghibli AI home">
        <span class="brand-mark" aria-hidden="true">G</span>
        <span>Ghibli AI</span>
      </a>
      <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="create.html">Create</a>
        <a href="features.html">Features</a>
        <a class="active" href="gallery.html">Gallery</a>
      </nav>
      <a class="header-cta" href="create.html">Create</a>
    </header>

    <main>
      <section class="gallery section-pad page-section" aria-labelledby="gallery-heading">
        <div class="section-shell">
          <div class="section-heading">
            <p class="eyebrow">Gallery</p>
            <h2 id="gallery-heading">Ghibli Images Gallery</h2>
          </div>

          <div class="gallery-grid">
            <article class="gallery-card" data-gallery-title="Forest Portrait">
              <svg viewBox="0 0 320 240" role="img" aria-label="Forest portrait artwork">
                <rect width="320" height="240" fill="#cfe4bd" />
                <path d="M0 190c70-50 160-60 320 0v50H0z" fill="#5f8f68" />
                <circle cx="168" cy="94" r="46" fill="#d99062" />
                <path d="M126 82c28-52 78-50 94 7-37-20-61-17-94-7z" fill="#50301d" />
                <path d="M118 170c18-50 83-63 109 0v70H118z" fill="#284c42" />
                <path d="M145 112c14 12 31 12 45 0" stroke="#6a3925" stroke-width="6" fill="none" stroke-linecap="round" />
              </svg>
              <h3>Forest Portrait</h3>
            </article>

            <article class="gallery-card" data-gallery-title="Sunlit Balcony">
              <svg viewBox="0 0 320 240" role="img" aria-label="Sunlit balcony artwork">
                <rect width="320" height="240" fill="#f3d99d" />
                <rect x="0" y="0" width="120" height="240" fill="#98c5c2" />
                <rect x="195" y="54" width="90" height="120" rx="8" fill="#7d5638" />
                <circle cx="140" cy="90" r="44" fill="#efb57c" />
                <path d="M102 92c8-50 66-70 91-18-32 0-53-10-91 18z" fill="#bd7a3e" />
                <path d="M92 166c26-48 83-55 119 0v74H92z" fill="#cf8144" />
                <path d="M120 112c17 12 34 12 51 0" stroke="#6a3925" stroke-width="6" fill="none" stroke-linecap="round" />
              </svg>
              <h3>Sunlit Balcony</h3>
            </article>

            <article class="gallery-card" data-gallery-title="Old Town Walk">
              <svg viewBox="0 0 320 240" role="img" aria-label="Old town walk artwork">
                <rect width="320" height="240" fill="#b9ddd9" />
                <path d="M0 54h86v132H0zM218 38h102v148H218z" fill="#e7b56e" />
                <path d="M0 190c108-28 212-28 320 0v50H0z" fill="#a86948" />
                <circle cx="156" cy="95" r="42" fill="#d89867" />
                <path d="M113 84c18-52 75-55 93-1-29-14-61-18-93 1z" fill="#52311e" />
                <path d="M103 162c30-47 80-49 111 0v78H103z" fill="#3b7184" />
              </svg>
              <h3>Old Town Walk</h3>
            </article>

            <article class="gallery-card" data-gallery-title="Garden Morning">
              <svg viewBox="0 0 320 240" role="img" aria-label="Garden morning artwork">
                <rect width="320" height="240" fill="#dce9b5" />
                <path d="M0 160c58-24 120-24 184 0s96 23 136 4v76H0z" fill="#4f8461" />
                <circle cx="110" cy="96" r="40" fill="#e0a06f" />
                <path d="M76 88c20-45 63-47 84 0-34-8-54-9-84 0z" fill="#493124" />
                <path d="M62 166c30-50 78-48 103 0v74H62z" fill="#8d2513" />
                <circle cx="235" cy="86" r="28" fill="#f5c35f" />
              </svg>
              <h3>Garden Morning</h3>
            </article>

            <article class="gallery-card" data-gallery-title="Cozy Desk">
              <svg viewBox="0 0 320 240" role="img" aria-label="Cozy desk artwork">
                <rect width="320" height="240" fill="#f0d2a0" />
                <rect x="24" y="34" width="90" height="124" rx="8" fill="#8abbb5" />
                <rect x="218" y="52" width="70" height="76" rx="6" fill="#34475b" />
                <circle cx="156" cy="94" r="42" fill="#cf875f" />
                <path d="M115 82c23-50 76-52 92 5-34-15-58-16-92-5z" fill="#30251d" />
                <path d="M92 166c38-51 90-49 128 0v74H92z" fill="#f5f0df" />
                <path d="M134 113c15 10 30 10 45 0" stroke="#6a3925" stroke-width="6" fill="none" stroke-linecap="round" />
              </svg>
              <h3>Cozy Desk</h3>
            </article>

            <article class="gallery-card" data-gallery-title="Cloud Courier">
              <svg viewBox="0 0 320 240" role="img" aria-label="Cloud courier artwork">
                <rect width="320" height="240" fill="#9ecbd3" />
                <path d="M25 76c20-25 62-25 80 0 35-14 70 10 72 42H12c1-19 5-32 13-42z" fill="#f5f0df" />
                <path d="M0 174c100-34 202-31 320 0v66H0z" fill="#6c9a70" />
                <circle cx="190" cy="100" r="38" fill="#dc9b66" />
                <path d="M156 92c15-42 63-46 75-1-30-12-48-13-75 1z" fill="#6b3f24" />
                <path d="M144 161c28-42 73-43 97 0v79h-97z" fill="#2c6d82" />
              </svg>
              <h3>Cloud Courier</h3>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="section-shell footer-grid">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true">G</span>
          <span>Ghibli AI</span>
        </a>
        <p>Independent creative full stack application using Spring Boot for backend. Not affiliated with Studio Ghibli.</p>

      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
